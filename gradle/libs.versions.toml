# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
# Detekt 1.23.8 is the latest stable (1.23.x line). It is built against Kotlin
# 2.0.21 and works with this project's Kotlin 2.3.20.
#
# WARNING (Gradle 10 migration): Detekt 1.23.8's plugin internally calls
# ReportingExtension.file(), which is deprecated in Gradle 9.x and scheduled
# for removal in Gradle 10. The build emits a deprecation warning today and
# will break on Gradle 10 unless Detekt is upgraded first. Before bumping
# Gradle, verify Detekt has a release that drops the deprecated call (a
# 1.23.x patch or Detekt 2.x — the latter natively supports the
# failOnSeverity API the design spec originally referenced).
detekt = "1.23.8"
owasp-dependency-check = "12.2.2"
kotlin = "2.4.0"
kotlinx-serialization = "1.8.0"
ktlint = "1.8.0"       # latest stable verified at impl time
mockwebserver = "4.12.0"
spotless = "8.6.0"     # latest stable verified at impl time

[libraries]
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }
mockwebserver = { module = "com.squareup.okhttp3:mockwebserver", version.ref = "mockwebserver" }

[plugins]
dependency-check = { id = "org.owasp.dependencycheck", version.ref = "owasp-dependency-check" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
